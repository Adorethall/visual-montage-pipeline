schema_version: "1.0"
workspace: data
analysis:
  proxy_width: 480
  proxy_fps: 3.0
  proxy_crf: 35
  minimum_candidates_per_video: 2
  minimum_candidates_per_run: 12
  minimum_distinct_sources: 5
  fallback_order:
    - marlin_broad_query
    - gemma_full_video_discovery
    - scene_frame_discovery
montage:
  duration_seconds: 20
  aspect_ratio: "9:16"
  max_clips_per_source: 2
  max_source_share: 0.25
  max_same_event_consecutive: 2
packaging:
  required: true
  voiceover_required: true
  voiceover_max_seconds: 8.0
  voiceover_max_overflow_seconds: 3.0
cover:
  required: true
  editable_title: true
  title_min_chars: 6
  title_max_chars: 16
  title_max_lines: 2

