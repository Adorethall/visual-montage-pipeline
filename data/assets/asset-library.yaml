brand_assets:
  - asset_id: rednote_logo_white_vertical
    type: logo_overlay
    path: data/assets/brand/logos/竖版白字-角标位置空间.png
    aspect_ratio: "9:16"
    color_variant: white

  - asset_id: rednote_logo_black_vertical
    type: logo_overlay
    path: data/assets/brand/logos/竖版黑字-角标位置空间.png
    aspect_ratio: "9:16"
    color_variant: black

  - asset_id: rednote_logo_white_vertical_animated
    type: logo_overlay_video
    path: data/assets/brand/logos/竖版动态白字-rednote.mov
    aspect_ratio: "9:16"
    color_variant: white
    duration_seconds: 30.0

  - asset_id: rednote_logo_black_vertical_animated
    type: logo_overlay_video
    path: data/assets/brand/logos/竖版动态黑字-rednote.mov
    aspect_ratio: "9:16"
    color_variant: black
    duration_seconds: 30.0

  - asset_id: rednote_endcard_vertical
    type: endcard
    path: data/assets/brand/endcards/竖版_尾贴.mov
    language: zh-CN
    aspect_ratio: "9:16"
    duration_seconds: 5.0
    recommended_trim_seconds: 2.5

  - asset_id: rednote_endcard_vertical_png
    type: endcard_image
    path: data/assets/brand/endcards/竖版-尾贴.png
    language: zh-CN
    aspect_ratio: "9:16"

overlay_assets:
