schema_version: "1.0"
category_id: travel
display_name: Travel Inspiration
aliases: [travel, trip, destination, itinerary, vacation, scenery, 出行, 旅行, 攻略]
preferred_events:
  destination_reveal: 1.0
  scenic_panorama: 0.98
  landmark_showcase: 0.95
  immersive_pov: 0.92
  travel_motion: 0.88
  local_experience: 0.86
  food_and_culture: 0.82
  hotel_reveal: 0.8
  itinerary_highlight: 0.76
  traveler_reaction: 0.72
penalized_events:
  talking_head: 0.75
  long_explanation: 0.7
  static_map: 0.62
  transport_waiting: 0.58
  obstructed_scenery: 0.55
clip_duration: {minimum: 0.8, preferred: 1.5, maximum: 3.0}
opening_events: [destination_reveal, scenic_panorama, landmark_showcase, immersive_pov]
cover_events: [destination_reveal, scenic_panorama, landmark_showcase, hotel_reveal]
cover_title_strategies: [destination_hook, bucket_list, itinerary, question, collection]

gemma_review:
  prompt_path: prompts/gemma-review/travel.md
  api_max_attempts: 3
  api_max_concurrency: 5
  api_retry_delays_seconds: [2.0, 5.0]
  minimum_candidates_per_video: 3
  candidate_topup_attempts: 2
  hard_filters:
    reject_chinese_subtitles: false
  candidate_count: {minimum: 3, maximum: 8}
  candidate_duration: {minimum: 1.0, preferred: 2.0, maximum: 3.5}
  default_event: destination_reveal
  events:
    destination_reveal: {label: Destination reveal, keywords: [destination reveal, arrival reveal, dramatic view]}
    scenic_panorama: {label: Scenic panorama, keywords: [landscape, panorama, mountain, beach, skyline]}
    landmark_showcase: {label: Landmark showcase, keywords: [landmark, architecture, iconic place]}
    immersive_pov: {label: Immersive travel POV, keywords: [walking POV, driving POV, first-person travel]}
    travel_motion: {label: Dynamic travel movement, keywords: [train, plane, boat, road trip, transition]}
    local_experience: {label: Local experience, keywords: [market, street, festival, local activity]}
    food_and_culture: {label: Local food or culture, keywords: [local food, cultural detail, craft, tradition]}
    hotel_reveal: {label: Hotel or stay reveal, keywords: [hotel room, resort, accommodation reveal, view]}
    itinerary_highlight: {label: Itinerary highlight, keywords: [route, multiple stops, day trip, itinerary]}
    traveler_reaction: {label: Traveler reaction, keywords: [delight, awe, joyful reaction, travel moment]}
  positive_visual_keywords:
    [visually self-contained travel moment, strong sense of place, impressive scenery,
     clear landmark, dynamic camera movement, immersive point of view,
     vivid local culture, aspirational stay, immediate visual payoff]
  negative_visual_keywords:
    [talking head, long explanation, static map, transport waiting,
     repetitive walking, obstructed scenery, subtitles covering the subject,
     blurred frame, transition frame, incomplete action]

marlin_recall:
  enabled: true
  minimum_video_duration_seconds: 30.0
  maximum_video_duration_seconds: 120.0
  segment_duration_seconds: 115.0
  segment_overlap_seconds: 5.0
  query_path: prompts/marlin-events/travel.yaml
  query_variant: normal
  max_query_groups: 4
  gemma_review_context_seconds: 1.5
  gemma_review_max_window_seconds: 12.0
  gemma_review_max_windows: 12
  gemma_review_max_recall_span_seconds: 30.0
  fail_open: true
  upload_prefix: visual-montage/marlin-inputs
  presigned_url_expires_seconds: 86400

contact_sheet:
  enabled: true
  columns: 4
  thumbnail_width: 320
  thumbnail_height: 480
  label_height: 86
  jpeg_quality: 88
  background_color: "#151515"
  label_color: "#F5F5F5"
  secondary_label_color: "#B8B8B8"

audio_bgm_analysis:
  enabled: true
  minimum_bgm_duration_seconds: 5.0
  remote_enrichment: true
  fail_open: true
  target_window_seconds: 20
  allowed_audio_types: [instrumental, song_with_lyrics, rap_song, music_with_spoken_overlay]
  minimum_music_score: 0.68
  maximum_speech_risk: 0.18
  minimum_separation_quality: 0.75
  preferred_bpm: {minimum: 100, target: 120, maximum: 138}
  same_bgm_max_per_batch: 2

batch_generation:
  cover_titles:
    - "Travel Inspo You Need To Save"
    - "Where Are You Going Next?"
    - "Your Next Dream Destination"
    - "Places Worth Adding To Your List"
    - "Plan Your Next Adventure"
    - "Travel Ideas For Your Next Trip"
    - "Destinations You Need To See"
    - "Your 2026 Travel Moodboard"
    - "Find Your Next Getaway"
    - "Save These Travel Ideas"
  history:
    enabled: true
    registry_path: data/catalog/candidate-registry.sqlite
  diversity:
    candidate_max_global_uses_per_batch: 4
    source_max_per_video: 2
    source_max_global_uses: 12
    previous_batch_penalty: 0.6
    historical_use_penalty: 0.15
    maximum_pairwise_candidate_overlap_ratio: 0.2
    minimum_never_used_candidate_ratio: 0.8
