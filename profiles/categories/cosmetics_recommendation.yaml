schema_version: "1.0"
category_id: cosmetics_recommendation
display_name: 化妆品推荐
parent_category: beauty
aliases: [化妆品推荐, 彩妆推荐, 产品试色, makeup recommendation, cosmetics review]

preferred_events:
  product_result_pairing: 1.0
  visible_application_result: 0.98
  texture_or_swatch: 0.94
  product_closeup: 0.88
  applicator_reveal: 0.84
  final_result_showcase: 0.82
penalized_events:
  talking_head: 0.82
  packaging_only: 0.58
  unreadable_product: 0.62
  application_without_result: 0.68

clip_duration: {minimum: 0.7, preferred: 1.3, maximum: 2.8}
opening_events: [product_result_pairing, visible_application_result, texture_or_swatch]
cover_events: [product_result_pairing, visible_application_result, product_closeup]
cover_title_strategies: [product_discovery, result_first, beauty_favorites]
cover_selection:
  gemma_enabled: true
  max_candidates: 5
  samples_per_candidate: 3

gemma_review:
  prompt_path: prompts/gemma-review/cosmetics_recommendation.md
  api_max_attempts: 3
  api_max_concurrency: 5
  api_retry_delays_seconds: [2.0, 5.0]
  minimum_candidates_per_video: 3
  candidate_topup_attempts: 2
  hard_filters:
    reject_chinese_subtitles: false
  candidate_count: {minimum: 3, maximum: 8}
  candidate_duration: {minimum: 0.8, preferred: 1.7, maximum: 3.2}
  default_event: product_result_pairing
  events:
    product_closeup:
      label: 产品外观特写
      keywords: [产品特写, 包装展示, 品牌可见, product close-up, packaging close-up]
    applicator_reveal:
      label: 开盖或刷头展示
      keywords: [开盖, 刷头, 泵头, 膏体挤出, applicator, wand reveal]
    texture_or_swatch:
      label: 质地或试色展示
      keywords: [质地, 试色, 手臂试色, 膏体延展, texture, swatch]
    visible_application_result:
      label: 使用动作及即时效果
      keywords: [上脸, 涂抹, 刷涂, 即时显色, application, visible result]
    product_result_pairing:
      label: 产品与妆效同框
      keywords: [产品妆效同框, 手持产品展示效果, product and result, product-result pairing]
    final_result_showcase:
      label: 使用后的最终妆效
      keywords: [最终效果, 完妆, 使用后效果, final result, finished makeup]
  positive_visual_keywords:
    - product clearly visible
    - product identity or form is understandable
    - texture or color payoff is visible
    - application action has an immediate visible result
    - product and finished result appear together
    - clean close-up composition
    - visually satisfying product interaction
  negative_visual_keywords:
    - talking head without product action
    - product too small or unreadable
    - packaging shown with no meaningful interaction
    - application with no visible payoff
    - repetitive rubbing or blending
    - subtitles covering product or application area
    - blurred product frame
    - incomplete action

marlin_recall:
  enabled: true
  minimum_video_duration_seconds: 30.0
  maximum_video_duration_seconds: 120.0
  segment_duration_seconds: 115.0
  segment_overlap_seconds: 5.0
  query_path: prompts/marlin-events/cosmetics_recommendation.yaml
  query_variant: normal
  max_query_groups: 5
  gemma_review_context_seconds: 1.5
  gemma_review_max_window_seconds: 12.0
  gemma_review_max_windows: 12
  gemma_review_max_recall_span_seconds: 30.0
  fail_open: true
  upload_prefix: visual-montage/marlin-inputs
  presigned_url_expires_seconds: 86400

contact_sheet:
  enabled: true
  columns: 4
  thumbnail_width: 320
  thumbnail_height: 480
  label_height: 86
  jpeg_quality: 88
  background_color: "#151515"
  label_color: "#F5F5F5"
  secondary_label_color: "#B8B8B8"

audio_bgm_analysis:
  enabled: true
  minimum_bgm_duration_seconds: 5.0
  remote_enrichment: true
  fail_open: true
  target_window_seconds: 20
  allowed_audio_types: [instrumental, song_with_lyrics, rap_song, music_with_spoken_overlay]
  minimum_music_score: 0.68
  maximum_speech_risk: 0.18
  minimum_separation_quality: 0.75
  preferred_bpm: {minimum: 108, target: 124, maximum: 138}
  same_bgm_max_per_batch: 2

batch_generation:
  cover_titles:
    - Beauty Finds Worth Trying
    - Makeup Products To Save
    - Your Next Beauty Favorite
    - Products With A Real Payoff
    - Beauty Picks To Try Next
  history:
    enabled: true
    registry_path: data/catalog/candidate-registry.sqlite
  author_grouping:
    enabled: true
    avoid_cross_section_reuse: true
  diversity:
    candidate_max_global_uses_per_batch: 4
    source_videos_per_creative: 3
    source_max_per_video: 4
    source_max_global_uses: 12
    previous_batch_penalty: 0.6
    historical_use_penalty: 0.15
    maximum_pairwise_candidate_overlap_ratio: 0.2
    minimum_never_used_candidate_ratio: 0.8
