schema_version: "1.0"
category_id: food
display_name: 美食展示
aliases: [美食, 美食展示, 菜谱, 烹饪, 食谱, food, cooking, recipe]
preferred_events:
  finished_dish_showcase: 1.0
  texture_reveal: 1.0
  cut_open_reveal: 0.98
  stretch_pull: 0.95
  final_plating: 0.92
  food_pickup: 0.88
  bite_action: 0.86
  pouring_action: 0.84
  cooking_flame: 0.82
  cooking_process: 0.78
  ingredient_showcase: 0.75
  tasting_reaction: 0.72
penalized_events:
  talking_head: 0.75
  ingredient_waiting: 0.7
  long_recipe_explanation: 0.65
  kitchen_empty_shot: 0.6
  preparation_without_food: 0.55

clip_duration: {minimum: 0.7, preferred: 1.3, maximum: 2.6}
opening_events: [texture_reveal, cut_open_reveal, stretch_pull, finished_dish_showcase, pouring_action]
cover_events: [finished_dish_showcase, texture_reveal, cut_open_reveal, stretch_pull]
cover_title_strategies: [sensory_hook, question, collection, tutorial, before_after]

content_types:
  recipe: [cooking_process, ingredient_showcase, final_plating]
  food_review: [tasting_reaction, texture_reveal, bite_action]
  food_advertisement: [finished_dish_showcase, texture_reveal, pouring_action]

visual_tags:
  cooking: [frying, boiling, baking, grilling]
  texture: [crispy, juicy, creamy, chewy, stretchy]
  presentation: [plating, garnish, close_up]
  eating: [bite, tasting, reaction]

gemma_review:
  prompt_path: prompts/gemma-review/food.md
  api_max_attempts: 3
  api_max_concurrency: 5
  api_retry_delays_seconds: [2.0, 5.0]
  minimum_candidates_per_video: 3
  candidate_topup_attempts: 2
  hard_filters:
    reject_chinese_subtitles: false
  candidate_count: {minimum: 3, maximum: 8}
  candidate_duration: {minimum: 1.0, preferred: 2.0, maximum: 3.5}
  default_event: finished_dish_showcase
  events:
    finished_dish_showcase: {label: 完整成品美食展示, keywords: [成品菜, 完整摆盘, finished dish, food showcase]}
    texture_reveal: {label: 食物质感特写, keywords: [酥脆, 多汁, 绵密, 断面, texture reveal]}
    cut_open_reveal: {label: 切开后的内部展示, keywords: [切开, 掰开, 流心, cut open, cross section]}
    stretch_pull: {label: 拉丝或延展动作, keywords: [拉丝, 芝士拉伸, cheese pull, stretch pull]}
    final_plating: {label: 最终装盘或点缀, keywords: [装盘, 摆盘, 撒料, final plating, garnish]}
    food_pickup: {label: 夹取或拿起食物, keywords: [夹起, 舀起, 筷子夹取, food pickup]}
    bite_action: {label: 清晰的咬下动作, keywords: [咬下, 入口, bite, eating action]}
    pouring_action: {label: 浇汁或倾倒动作, keywords: [浇汁, 淋酱, pouring sauce, drizzle]}
    cooking_flame: {label: 火焰或高温烹饪动作, keywords: [火焰, 炙烤, 爆炒, cooking flame]}
    cooking_process: {label: 有吸引力的烹饪动作, keywords: [翻炒, 油炸, 烘烤, cooking action]}
    ingredient_showcase: {label: 新鲜食材展示, keywords: [食材特写, 新鲜原料, ingredients]}
    tasting_reaction: {label: 明确愉悦的品尝反应, keywords: [品尝反应, 满足表情, tasting reaction]}
  positive_visual_keywords:
    [visually self-contained food moment, appetizing finished dish, clear food texture,
     strong close-up composition, visible steam or gloss, satisfying cut or pull action,
     dynamic pouring or plating, clear bite or pickup action, immediate visual payoff]
  negative_visual_keywords:
    [talking head, long recipe explanation, static ingredient waiting shot,
     empty kitchen or table, preparation without visible food payoff, repetitive stirring,
     subtitles covering the food, blurred or obstructed food, transition frame, incomplete action]

marlin_recall:
  enabled: true
  minimum_video_duration_seconds: 30.0
  maximum_video_duration_seconds: 120.0
  segment_duration_seconds: 115.0
  segment_overlap_seconds: 5.0
  query_path: prompts/marlin-events/food.yaml
  query_variant: normal
  max_query_groups: 4
  gemma_review_context_seconds: 1.5
  gemma_review_max_window_seconds: 12.0
  gemma_review_max_windows: 12
  gemma_review_max_recall_span_seconds: 30.0
  fail_open: true
  upload_prefix: visual-montage/marlin-inputs
  presigned_url_expires_seconds: 86400

contact_sheet:
  enabled: true
  columns: 4
  thumbnail_width: 320
  thumbnail_height: 480
  label_height: 86
  jpeg_quality: 88
  background_color: "#151515"
  label_color: "#F5F5F5"
  secondary_label_color: "#B8B8B8"

audio_bgm_analysis:
  enabled: true
  minimum_bgm_duration_seconds: 5.0
  remote_enrichment: true
  fail_open: true
  target_window_seconds: 20
  allowed_audio_types: [instrumental, song_with_lyrics, rap_song, music_with_spoken_overlay]
  minimum_music_score: 0.68
  maximum_speech_risk: 0.18
  minimum_separation_quality: 0.75
  preferred_bpm: {minimum: 105, target: 124, maximum: 140}
  same_bgm_max_per_batch: 2

batch_generation:
  cover_titles:
    - "Food Inspo You Need To Save"
    - "What Are You Craving Today?"
    - "Delicious Ideas For Your Next Meal"
    - "Your Next Food Obsession"
    - "Recipes Worth Saving"
    - "Find Your Next Favorite Dish"
    - "Food Ideas You Need To Try"
    - "Satisfying Food Moments"
    - "Endless Food Inspiration"
  history:
    enabled: true
    registry_path: data/catalog/candidate-registry.sqlite
  diversity:
    candidate_max_global_uses_per_batch: 4
    source_max_per_video: 2
    source_max_global_uses: 12
    previous_batch_penalty: 0.6
    historical_use_penalty: 0.15
    maximum_pairwise_candidate_overlap_ratio: 0.2
    minimum_never_used_candidate_ratio: 0.8
