    path: data/assets/brand/fonts/中文_抖音美好体/DouyinSansBold.ttf
    language: zh
    usage: [cover_title, hook, subtitle, cta]

  - asset_id: helvetica_now_display_black
    path: data/assets/brand/fonts/英文_1/HelveticaNowDisplayBlack.ttf
    language: en
    usage: [cover_title, hook, cta]

  - asset_id: din_ot_black
    path: data/assets/brand/fonts/英文_2/DINOT-Black.ttf
    language: en
    usage: [cover_title, hook, cta]

