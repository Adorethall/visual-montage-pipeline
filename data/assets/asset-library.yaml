schema_version: "1.0"

product_openpages:
  - asset_id: rednote_openpage_zh_vertical
    type: product_openpage
    path: data/assets/product-openpages/开屏_中文.mov
    language: zh-CN
    aspect_ratio: "9:16"
    width: 720
    height: 1280
    fps: 30
    duration_seconds: 1.533
    mandatory: true
    audio_policy: preserve

